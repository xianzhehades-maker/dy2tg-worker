name: UP Polling and Video Processing

on:
  repository_dispatch:
    types: [poll-and-process]

  workflow_dispatch:

jobs:
  poll-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg net-tools

      - name: Setup Xray Proxy
        run: |
          echo "=== Starting Xray Proxy Setup ==="
          # 下载最新的 Xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          echo "=== Xray downloaded ==="
          # 解压，自动覆盖已有文件
          unzip -o xray.zip
          echo "=== Xray unzipped ==="
          ls -la
          echo "=== config.json content ==="
          cat config.json
          echo "=== Starting Xray ==="
          # 后台启动，并把日志存起来方便报错查看
          ./xray -c config.json > xray_log.txt 2>&1 &
          XRAY_PID=$!
          echo "Xray PID: $XRAY_PID"
          # 给一点启动时间
          sleep 10
          echo "=== After 10 seconds ==="
          # 检查 Xray 是否还在运行
          ps aux | grep xray || echo "Xray process not found"
          # 检查 1080 端口是否开了
          echo "=== Checking ports ==="
          netstat -tuln || echo "netstat not available"
          ss -tuln || echo "ss not available"
          echo "=== Xray log (first 100 lines) ==="
          cat xray_log.txt || echo "No xray_log.txt found"
          echo "=== Xray Proxy Setup Complete ==="

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements_hf.txt

      - name: Poll UPs and dispatch new videos
        env:
          WORKERS_URL: ${{ secrets.WORKERS_URL }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          GH_REPO: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PROXY_URL: http://127.0.0.1:1080
        run: |
          python .github/workflows/poll_up.py

      - name: Check Xray Log if Failed
        if: failure()
        run: cat xray_log.txt