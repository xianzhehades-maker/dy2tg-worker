name: Video Processing Dispatch

on:
  repository_dispatch:
    types: [video-process]

  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL (UP homepage)'
        required: true
      task_id:
        description: 'Video ID (aweme_id)'
        required: true
      chat_id:
        description: 'TG Chat ID'
        required: false
      video_desc:
        description: 'Video description'
        required: false
      caption_style:
        description: 'Caption style (default, humor, none)'
        required: false
      group_id:
        description: 'Group ID for target channels'
        required: false

concurrency:
  group: video-process-${{ github.event.client_payload.task_id || inputs.task_id }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg net-tools

      - name: Setup Xray Proxy
        run: |
          echo "=== Starting Xray Proxy Setup ==="
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          echo "=== Xray downloaded ==="
          unzip -o xray.zip
          echo "=== Xray unzipped ==="
          ls -la
          echo "=== config.json content ==="
          cat config.json
          echo "=== Starting Xray ==="
          ./xray -c config.json > xray_log.txt 2>&1 &
          XRAY_PID=$!
          echo "Xray PID: $XRAY_PID"
          sleep 10
          echo "=== After 10 seconds ==="
          ps aux | grep xray || echo "Xray process not found"
          echo "=== Checking ports ==="
          netstat -tuln || echo "netstat not available"
          ss -tuln || echo "ss not available"
          echo "=== Xray log (first 100 lines) ==="
          cat xray_log.txt || echo "No xray_log.txt found"
          echo "=== Xray Proxy Setup Complete ==="

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements_hf.txt

      - name: Test Proxy
        run: |
          echo "=== Testing proxy connection ==="
          echo "--- Testing without proxy ---"
          curl -I --connect-timeout 10 https://www.douyin.com 2>&1 || echo "Failed to connect without proxy"
          echo "--- Testing with proxy ---"
          curl -I --proxy http://127.0.0.1:1080 --connect-timeout 10 https://www.douyin.com 2>&1 || echo "Failed to connect with proxy"
          echo "=== Proxy test complete ==="

      - name: Process Video
        env:
          VIDEO_URL: ${{ github.event.client_payload.video_url || inputs.video_url }}
          TASK_ID: ${{ github.event.client_payload.task_id || inputs.task_id }}
          CHAT_ID: ${{ github.event.client_payload.chat_id || inputs.chat_id }}
          VIDEO_DESC: ${{ github.event.client_payload.video_desc || inputs.video_desc }}
          CAPTION_STYLE: ${{ github.event.client_payload.caption_style || inputs.caption_style || 'default' }}
          GROUP_ID: ${{ github.event.client_payload.group_id || inputs.group_id }}
          GENERATE_AI_CAPTION: "true"
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          WORKERS_URL: ${{ secrets.WORKERS_URL }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WATERMARK_TEXT: ${{ secrets.WATERMARK_TEXT }}
          PROXY_URL: http://127.0.0.1:1080
          GITHUB_ACTIONS: "true"
        run: |
          python hf_worker.py

      - name: Check Xray Log if Failed
        if: failure()
        run: cat xray_log.txt

      - name: Notify result
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Video processing completed for task ${{ github.event.client_payload.task_id || inputs.task_id }}"
          else
            echo "❌ Video processing failed for task ${{ github.event.client_payload.task_id || inputs.task_id }}"
          fi
